x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"

services:
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-40}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}
      - -c
      - work_mem=${POSTGRES_WORK_MEM:-4MB}
      - -c
      - maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEM_LIMIT:-512m}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  strapi:
    build:
      context: .
      dockerfile: Dockerfile.fullstack
    restart: unless-stopped
    init: true
    mem_limit: ${STRAPI_MEM_LIMIT:-768m}
    pids_limit: ${STRAPI_PIDS_LIMIT:-256}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=${NODE_MAX_OLD_SPACE_SIZE:-384}
      STRAPI_TELEMETRY_DISABLED: "true"
      TZ: ${APP_TIMEZONE:-Etc/GMT-3}
      APP_UTC_OFFSET: ${APP_UTC_OFFSET:-+03:00}
      HOST: 0.0.0.0
      PORT: 1337
      PUBLIC_URL: ${PUBLIC_URL}
      ADMIN_URL: ${ADMIN_URL}
      IS_PROXIED: "true"
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_SSL: "false"
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-0}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-4}
      DATABASE_POOL_IDLE_TIMEOUT: ${DATABASE_POOL_IDLE_TIMEOUT:-30000}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      ENCRYPTION_KEY: ${STRAPI_ENCRYPTION_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      IMG_ORIGIN: "'self',data:,blob:,market-assets.strapi.io"
    expose:
      - "1337"
    volumes:
      - strapi-uploads:/opt/app/public/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:1337/api/health/ready').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging: *default-logging

  webstudio:
    build:
      context: ./webstudio
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    mem_limit: ${WEBSTUDIO_MEM_LIMIT:-256m}
    expose:
      - "3000"
    logging: *default-logging

  caddy:
    build:
      context: .
      dockerfile: deploy/caddy/Dockerfile.webstudio
    restart: unless-stopped
    mem_limit: ${CADDY_MEM_LIMIT:-128m}
    depends_on:
      strapi:
        condition: service_healthy
      webstudio:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    logging: *default-logging

volumes:
  pg-data:
  strapi-uploads:
  caddy-data:
  caddy-config:
