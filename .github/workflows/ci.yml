name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/strapi-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/strapi-app/package-lock.json

      - name: Prepare env
        run: cp .env.example .env

      - name: Install dependencies
        run: npm ci

      - name: Build admin
        env:
          CI: "true"
          STRAPI_TELEMETRY_DISABLED: "true"
        run: npm run build

      - name: Quality gate
        env:
          CI: "true"
          STRAPI_TELEMETRY_DISABLED: "true"
        run: npm run test:ci
