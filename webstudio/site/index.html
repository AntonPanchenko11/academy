<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Academy Webstudio Release</title>
    <meta
      name="description"
      content="Базовый frontend release для Webstudio-контура. Замените содержимое директории webstudio результатом export из Webstudio."
    />
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f4f1ea;
        color: #1f1b16;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(201, 156, 91, 0.18), transparent 34%),
          linear-gradient(160deg, #f7f2ea 0%, #efe6d9 100%);
      }

      main {
        width: min(720px, calc(100vw - 32px));
        padding: 40px 32px;
        border: 1px solid rgba(31, 27, 22, 0.08);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 18px 40px rgba(31, 27, 22, 0.08);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(32px, 5vw, 48px);
        line-height: 1.05;
      }

      p {
        margin: 0 0 14px;
        font-size: 18px;
        line-height: 1.55;
      }

      code {
        padding: 0.15em 0.4em;
        border-radius: 6px;
        background: rgba(31, 27, 22, 0.08);
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.92em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Webstudio contour is ready</h1>
      <p>Этот контейнер нужен как безопасный fallback release для production-контура.</p>
      <p>Для реального релиза замените содержимое <code>webstudio/</code> на export из Webstudio с production <code>Dockerfile</code>.</p>
      <p>Backend и public API доступны по same-origin маршрутам через reverse proxy.</p>
    </main>
  </body>
</html>
